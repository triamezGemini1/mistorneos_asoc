name: Despliegue de PRUEBAS (BETA)

on:
  push:
    branches:
      - develop
      - mistorneos_beta
      - feature-final-unification
  workflow_dispatch:

jobs:
  FTP-Deploy-Action:
    name: FTP-Deploy-Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Subiendo a carpeta BETA (mistorneos_beta)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/mistorneos_beta/
          security: loose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/vendor/**
            .env
            **/.env
            **/upload/**
            **/uploads/**
            **/.vscode/**
            **/*.zip
            **/tests/**
